databases:
  - name: cyberverse-db
    databaseName: cyberverse
    user: cyberverse
    plan: free
    region: oregon

services:
  # Single web service — Express API + Vite-built React frontend on the same domain.
  # No cross-origin issues; relative /api/* calls work out of the box.
  - type: web
    name: cyberverse-app
    env: node
    plan: free
    region: oregon
    buildCommand: >-
      npm install -g pnpm@9 &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ pnpm --filter @workspace/cyberverse run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: STATIC_DIR
        value: artifacts/cyberverse/dist/public
      - key: DATABASE_URL
        fromDatabase:
          name: cyberverse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
