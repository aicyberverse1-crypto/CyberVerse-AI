services:
  # ── API Server (Express + PostgreSQL) ────────────────────────────────────────
  - type: web
    name: cyberverse-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/db run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: cyberverse-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false  # Set this manually in the Render dashboard

  # ── Frontend (Vite static build) ─────────────────────────────────────────────
  - type: web
    name: cyberverse-web
    runtime: static
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/cyberverse run build
    staticPublishPath: artifacts/cyberverse/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # Proxy /api/* to the API server
      - type: rewrite
        source: /api/*
        destination: https://cyberverse-api.onrender.com/api/:splat
      # SPA fallback — all other paths serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production

databases:
  - name: cyberverse-db
    databaseName: cyberverse
    user: cyberverse
    plan: free
    region: oregon
