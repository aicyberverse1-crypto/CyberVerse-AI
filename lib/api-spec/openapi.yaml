openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: CyberVerse AI - Hacker vs Defender Simulator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile and progress
  - name: questions
    description: Game question management
  - name: scores
    description: Score and XP tracking
  - name: leaderboard
    description: Leaderboard operations
  - name: ai
    description: AI assistant operations
  - name: skills
    description: Skill tree operations
  - name: missions
    description: AI-generated missions
  - name: multiplayer
    description: Multiplayer challenge operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user:
    get:
      operationId: getUser
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/hacker-type:
    post:
      operationId: setHackerType
      tags: [users]
      summary: Set hacker type (Defender or Attacker)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetHackerTypeBody"
      responses:
        "200":
          description: Hacker type updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/daily-claim:
    post:
      operationId: claimDailyBonus
      tags: [users]
      summary: Claim daily hint point bonus
      responses:
        "200":
          description: Daily bonus claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyClaimResult"
        "400":
          description: Already claimed today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /questions:
    get:
      operationId: getQuestions
      tags: [questions]
      summary: Get questions for a game mode
      parameters:
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [phishing, defense, builder, escape]
        - name: difficulty
          in: query
          required: false
          schema:
            type: string
            enum: [easy, medium, hard, expert]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"

  /score:
    post:
      operationId: submitScore
      tags: [scores]
      summary: Submit score and gain XP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitScoreBody"
      responses:
        "200":
          description: Score submitted and XP updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get top players leaderboard
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: filter
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, all-time]
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [scores]
      summary: Get aggregated dashboard stats for current user
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills:
    get:
      operationId: getSkills
      tags: [skills]
      summary: Get all skills and user unlock status
      responses:
        "200":
          description: Skills data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/unlock:
    post:
      operationId: unlockSkill
      tags: [skills]
      summary: Unlock a skill using skill points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlockSkillBody"
      responses:
        "200":
          description: Skill unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnlockSkillResult"
        "400":
          description: Not enough skill points or already unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /missions/generate:
    post:
      operationId: generateMission
      tags: [missions]
      summary: AI-generate a custom mission based on player profile
      responses:
        "200":
          description: Generated mission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /multiplayer/challenge:
    post:
      operationId: startMultiplayerChallenge
      tags: [multiplayer]
      summary: Start a multiplayer challenge (vs AI opponent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiplayerChallengeBody"
      responses:
        "200":
          description: Challenge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiplayerResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/hint:
    post:
      operationId: getAiHint
      tags: [ai]
      summary: Get an AI hint for a scenario (costs hint points)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiHintBody"
      responses:
        "200":
          description: AI hint response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiHintResponse"
        "402":
          description: Not enough hint points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/chat:
    post:
      operationId: sendAiChatMessage
      tags: [ai]
      summary: Send a message to the AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatBody"
      responses:
        "200":
          description: AI assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        hackerType:
          type: string
          enum: [defender, attacker]
      required:
        - username
        - password

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    SetHackerTypeBody:
      type: object
      properties:
        hackerType:
          type: string
          enum: [defender, attacker]
      required:
        - hackerType

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        xp:
          type: integer
        level:
          type: integer
        totalScore:
          type: integer
        hintPoints:
          type: integer
        hackerType:
          type: string
        skillPoints:
          type: integer
        unlockedSkills:
          type: array
          items:
            type: string
        rankTier:
          type: string
        accuracyRate:
          type: number
        streakDays:
          type: integer
        dailyScore:
          type: integer
        isTopHacker:
          type: boolean
        lastClaimedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - username
        - xp
        - level
        - totalScore
        - hintPoints
        - hackerType
        - skillPoints
        - unlockedSkills
        - rankTier
        - accuracyRate
        - streakDays
        - dailyScore
        - isTopHacker
        - lastClaimedAt
        - createdAt

    DailyClaimResult:
      type: object
      properties:
        hintPointsEarned:
          type: integer
        streakDays:
          type: integer
        totalHintPoints:
          type: integer
        message:
          type: string
      required:
        - hintPointsEarned
        - streakDays
        - totalHintPoints
        - message

    Question:
      type: object
      properties:
        id:
          type: integer
        mode:
          type: string
        scenario:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
        explanation:
          type: string
        difficulty:
          type: string
      required:
        - id
        - mode
        - scenario
        - options
        - correctAnswer
        - explanation
        - difficulty

    SubmitScoreBody:
      type: object
      properties:
        mode:
          type: string
        score:
          type: integer
        xpEarned:
          type: integer
        isCorrect:
          type: boolean
        responseTimeMs:
          type: ["integer", "null"]
      required:
        - mode
        - score
        - xpEarned
        - isCorrect

    ScoreResult:
      type: object
      properties:
        totalScore:
          type: integer
        xp:
          type: integer
        level:
          type: integer
        leveledUp:
          type: boolean
        hintPoints:
          type: integer
        hintPointsEarned:
          type: integer
        rankTier:
          type: string
        skillPoints:
          type: integer
        newSkillPoint:
          type: boolean
      required:
        - totalScore
        - xp
        - level
        - leveledUp
        - hintPoints
        - hintPointsEarned
        - rankTier
        - skillPoints
        - newSkillPoint

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        username:
          type: string
        totalScore:
          type: integer
        dailyScore:
          type: integer
        xp:
          type: integer
        level:
          type: integer
        rankTier:
          type: string
        hackerType:
          type: string
        isTopHacker:
          type: boolean
      required:
        - rank
        - username
        - totalScore
        - dailyScore
        - xp
        - level
        - rankTier
        - hackerType
        - isTopHacker

    DashboardStats:
      type: object
      properties:
        totalScore:
          type: integer
        xp:
          type: integer
        level:
          type: integer
        xpToNextLevel:
          type: integer
        gamesPlayed:
          type: integer
        phishingScore:
          type: integer
        defenseScore:
          type: integer
        builderScore:
          type: integer
        escapeScore:
          type: integer
        rank:
          type: ["integer", "null"]
        hintPoints:
          type: integer
        rankTier:
          type: string
        accuracyRate:
          type: number
        streakDays:
          type: integer
        dailyScore:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required:
        - totalScore
        - xp
        - level
        - xpToNextLevel
        - gamesPlayed
        - phishingScore
        - defenseScore
        - builderScore
        - escapeScore
        - rank
        - hintPoints
        - rankTier
        - accuracyRate
        - streakDays
        - dailyScore
        - recentActivity

    ActivityItem:
      type: object
      properties:
        mode:
          type: string
        score:
          type: integer
        xpEarned:
          type: integer
        createdAt:
          type: string
      required:
        - mode
        - score
        - xpEarned
        - createdAt

    Skill:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [defender, attacker]
        cost:
          type: integer
        effect:
          type: string
        icon:
          type: string
      required:
        - id
        - name
        - description
        - type
        - cost
        - effect
        - icon

    SkillsResponse:
      type: object
      properties:
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
        unlockedSkills:
          type: array
          items:
            type: string
        skillPoints:
          type: integer
        hackerType:
          type: string
      required:
        - skills
        - unlockedSkills
        - skillPoints
        - hackerType

    UnlockSkillBody:
      type: object
      properties:
        skillId:
          type: string
      required:
        - skillId

    UnlockSkillResult:
      type: object
      properties:
        success:
          type: boolean
        skillPoints:
          type: integer
        unlockedSkills:
          type: array
          items:
            type: string
        message:
          type: string
      required:
        - success
        - skillPoints
        - unlockedSkills
        - message

    MissionObjective:
      type: object
      properties:
        text:
          type: string
        xpReward:
          type: integer
      required:
        - text
        - xpReward

    Mission:
      type: object
      properties:
        title:
          type: string
        scenario:
          type: string
        difficulty:
          type: string
        objectives:
          type: array
          items:
            $ref: "#/components/schemas/MissionObjective"
        hints:
          type: array
          items:
            type: string
        rewards:
          type: object
          properties:
            xp:
              type: integer
            score:
              type: integer
            hintPoints:
              type: integer
          required:
            - xp
            - score
            - hintPoints
        hackerType:
          type: string
      required:
        - title
        - scenario
        - difficulty
        - objectives
        - hints
        - rewards
        - hackerType

    MultiplayerChallengeBody:
      type: object
      properties:
        mode:
          type: string
        opponentDifficulty:
          type: string
          enum: [easy, medium, hard, expert]
      required:
        - mode
        - opponentDifficulty

    MultiplayerResult:
      type: object
      properties:
        playerScore:
          type: integer
        opponentScore:
          type: integer
        opponentName:
          type: string
        winner:
          type: string
          enum: [player, opponent, draw]
        xpEarned:
          type: integer
        hintPointsEarned:
          type: integer
        message:
          type: string
      required:
        - playerScore
        - opponentScore
        - opponentName
        - winner
        - xpEarned
        - hintPointsEarned
        - message

    AiHintBody:
      type: object
      properties:
        scenario:
          type: string
        question:
          type: string
        mode:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard, expert]
      required:
        - scenario
        - question
        - mode

    AiHintResponse:
      type: object
      properties:
        hint:
          type: string
        hintPointsCost:
          type: integer
        hintPointsRemaining:
          type: integer
      required:
        - hint
        - hintPointsCost
        - hintPointsRemaining

    AiChatBody:
      type: object
      properties:
        message:
          type: string
        gameMode:
          type: ["string", "null"]
      required:
        - message

    AiChatResponse:
      type: object
      properties:
        response:
          type: string
      required:
        - response
